<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Tic Tac Toe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            touch-action: manipulation; /* 모바일 더블탭 줌 방지 */
        }

        .cell {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(2rem, 10vw, 3.5rem);
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: white;
            border-radius: 1rem;
            box-shadow: inset 0 0 0 2px #f3f4f6;
        }

        .cell:active {
            transform: scale(0.95);
        }

        .cell.occupied {
            cursor: default;
        }

        .player-o { color: #ef4444; }
        .player-x { color: #3b82f6; }

        @keyframes pulse-delete {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.9); }
        }
        .oldest-mark {
            animation: pulse-delete 1.5s infinite ease-in-out;
        }

        .winning-cell {
            background-color: #10b981 !important;
            color: white !important;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.4);
            z-index: 10;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-[2rem] shadow-2xl p-6 md:p-10 fade-in">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black text-slate-800 mb-3 tracking-tight">TIC TAC TOE</h1>
            <div class="inline-block bg-slate-100 px-4 py-1.5 rounded-full text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                4-Mark Strategy Mode
            </div>
        </header>

        <div class="grid grid-cols-3 gap-4 mb-8">
            <div id="status-o" class="flex flex-col items-center p-4 rounded-2xl border-2 border-red-500 bg-red-50 transition-all duration-300">
                <span class="text-[10px] font-bold text-red-400 uppercase mb-1">Player O</span>
                <span id="count-o" class="text-2xl font-black text-red-600">0 / 4</span>
            </div>
            
            <div class="flex items-center justify-center">
                <div id="game-message" class="text-sm font-bold text-slate-600 text-center leading-tight">
                    O의 차례
                </div>
            </div>

            <div id="status-x" class="flex flex-col items-center p-4 rounded-2xl border-2 border-transparent bg-slate-50 transition-all duration-300">
                <span class="text-[10px] font-bold text-slate-400 uppercase mb-1">Player X</span>
                <span id="count-x" class="text-2xl font-black text-slate-400">0 / 4</span>
            </div>
        </div>

        <div id="board" class="grid grid-cols-3 gap-3 mb-8 bg-slate-100 p-3 rounded-[1.5rem]">
            <!-- Cells generated by JS -->
        </div>

        <div class="space-y-3">
            <button id="reset-btn" class="w-full py-4 bg-slate-800 hover:bg-slate-900 text-white rounded-2xl font-bold transition-all shadow-lg active:scale-95">
                다시 시작
            </button>
            <p class="text-center text-[11px] text-slate-400 leading-relaxed">
                각 플레이어는 최대 4개의 표식만 유지 가능합니다.<br>
                새 표식을 두면 가장 오래된 표식이 사라집니다.
            </p>
        </div>
    </div>

    <script>
        const boardElement = document.getElementById('board');
        const messageElement = document.getElementById('game-message');
        const resetBtn = document.getElementById('reset-btn');
        const countOElement = document.getElementById('count-o');
        const countXElement = document.getElementById('count-x');
        const statusO = document.getElementById('status-o');
        const statusX = document.getElementById('status-x');

        let board = Array(9).fill(null);
        let currentPlayer = 'O';
        let gameActive = true;
        let historyO = [];
        let historyX = [];

        function init() {
            boardElement.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => handleMove(i);
                boardElement.appendChild(cell);
            }
            render();
        }

        function handleMove(i) {
            if (!gameActive || board[i]) return;

            board[i] = currentPlayer;
            const history = currentPlayer === 'O' ? historyO : historyX;
            history.push(i);

            if (history.length > 4) {
                const old = history.shift();
                board[old] = null;
            }

            if (checkWin()) {
                gameActive = false;
                render();
                messageElement.innerHTML = `<span class="text-lg font-black ${currentPlayer === 'O' ? 'text-red-600' : 'text-blue-600'}">${currentPlayer} 승리! 🎉</span>`;
            } else {
                currentPlayer = currentPlayer === 'O' ? 'X' : 'O';
                render();
            }
        }

        function render() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach((cell, i) => {
                cell.innerText = board[i] || '';
                cell.classList.remove('player-o', 'player-x', 'occupied', 'oldest-mark');
                
                if (board[i]) {
                    cell.classList.add('occupied', board[i] === 'O' ? 'player-o' : 'player-x');
                }

                // Show removal hint for current player
                const currentHistory = (currentPlayer === 'O' ? historyO : historyX);
                if (gameActive && currentHistory.length === 4 && currentHistory[0] === i) {
                    cell.classList.add('oldest-mark');
                }
            });

            countOElement.innerText = `${historyO.length} / 4`;
            countXElement.innerText = `${historyX.length} / 4`;

            if (gameActive) {
                messageElement.innerText = `${currentPlayer}의 차례`;
                if (currentPlayer === 'O') {
                    statusO.className = "flex flex-col items-center p-4 rounded-2xl border-2 border-red-500 bg-red-50 transition-all";
                    statusX.className = "flex flex-col items-center p-4 rounded-2xl border-2 border-transparent bg-slate-50 transition-all";
                } else {
                    statusX.className = "flex flex-col items-center p-4 rounded-2xl border-2 border-blue-500 bg-blue-50 transition-all";
                    statusO.className = "flex flex-col items-center p-4 rounded-2xl border-2 border-transparent bg-slate-50 transition-all";
                }
            }
        }

        function checkWin() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let [a, b, c] of wins) {
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    const cells = document.querySelectorAll('.cell');
                    [a, b, c].forEach(idx => cells[idx].classList.add('winning-cell'));
                    return true;
                }
            }
            return false;
        }

        resetBtn.onclick = () => {
            board = Array(9).fill(null);
            historyO = [];
            historyX = [];
            currentPlayer = 'O';
            gameActive = true;
            init();
        };

        window.onload = init;
    </script>
</body>
</html>
